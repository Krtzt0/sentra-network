<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>S.E.N.T.R.A</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="style.css"
  />
</head>

<body>

  <!-- Background -->
  <div class="background"></div>

  <!-- Binary Layer -->
  <div
    class="binary-layer"
    id="binaryLayer"
  ></div>

  <!-- Top Navigation -->
  <header class="topbar">

    <div class="top-left">

      <img
        src="assets/main-logo.png"
        alt="Logo"
        class="top-logo"
      />

      <span class="network-text">
        S.E.N.T.R.A. NETWORK
      </span>

    </div>

    <div class="top-right">

      <span>
        International Threat Response System
      </span>

      <div class="divider"></div>

      <span id="utcClock">
        UTC 00:00:00
      </span>

    </div>

  </header>

  <!-- Main Content -->
  <main class="container">

    <div class="content">

      <!-- Side Decorations -->
      <div class="side-accent left"></div>
      <div class="side-accent right"></div>

      <!-- Center Logo -->
      <img
        src="assets/main-logo.png"
        alt="Main Logo"
        class="main-logo"
      />

      <!-- Title -->
     <h1 class="welcome-title">
        S.E.N.T.R.A
      </h1>

      <!-- Subtitle -->
      <p class="subtitle">
        STRATEGIC ENFORCEMENT OF NEUTRALIZING THREATS & RUST ANOMALIES
      </p>

      <!-- Login -->
      <section class="login-section">

         <div class="input-group">
  <input
    type="text"
    id="username"
    placeholder="Username"
  />

</div>

<div class="input-group">
  <input
    type="password"
    id="password"
    placeholder="Password"
  />

</div>

        <a
          href="#"
          class="login-button"
          id="loginBtn"
        >
          Login
        </a>

      </section>

    </div>

  </main>

  <!-- JS -->
  <script src="script.js"></script>

</body>

</html>
