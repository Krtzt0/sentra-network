<!-- about.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>ABOUT S.E.N.T.R.A</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --white:#ffffff;
      --line:rgba(255,255,255,.16);
      --soft:rgba(255,255,255,.72);
      --bg:#000000;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:var(--bg);
      color:white;

      font-family:'Inter',sans-serif;

      overflow-x:hidden;
    }

    /* ========================= */
    /* TOP BAR */
    /* ========================= */

    .topbar{

      position:fixed;

      top:0;
      left:0;

      width:100%;
      height:96px;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:0 42px;

      background:
        rgba(0,0,0,.96);

      backdrop-filter:blur(10px);

      border-bottom:
        1px solid rgba(255,255,255,.15);

      z-index:999;
    }

    .topbar::after{

      content:"";

      position:absolute;

      left:0;
      bottom:-1px;

      width:100%;
      height:1px;

      background:
        linear-gradient(
          to right,
          transparent,
          rgba(255,255,255,.22),
          transparent
        );
    }

    /* LEFT */

    .top-left{

      display:flex;
      align-items:center;

      gap:18px;
    }

    .top-logo{

      width:56px;
      height:56px;

      object-fit:contain;

      opacity:.95;
    }

    .top-info{
      display:flex;
      flex-direction:column;
    }

    .network-title{

      font-family:'Orbitron',sans-serif;

      font-size:18px;
      font-weight:700;

      letter-spacing:1px;

      line-height:1;

      color:white;
    }

    .network-subtitle{

      margin-top:4px;

      font-size:12px;

      color:
        rgba(255,255,255,.76);

      letter-spacing:.4px;
    }

    /* NAV */

    .top-nav{
      display:flex;
      align-items:center;
    }

    .nav-group{

      display:flex;
      align-items:center;

      gap:28px;
    }

    .nav-link{

      text-decoration:none;

      color:
        rgba(255,255,255,.62);

      font-size:14px;
      font-weight:500;

      letter-spacing:.4px;

      transition:.25s;
    }

    .nav-link:hover{
      color:white;
    }

    .nav-link.active{
      color:white;
      font-weight:700;
    }

    .nav-divider{

      width:1px;
      height:20px;

      background:
        rgba(255,255,255,.38);
    }

   

    


    /* ========================= */
    /* RESPONSIVE */
    /* ========================= */

    @media(max-width:1200px){

      .about-layout,
      .core-layout{
        grid-template-columns:1fr;
      }

      .fingerprint-wrap{
        display:none;
      }
    }

    @media(max-width:768px){

      .topbar{
        padding:0 18px;
        height:84px;
      }

      .top-nav{
        overflow:auto;
      }

      .nav-group{
        gap:14px;
      }

      .nav-link{
        white-space:nowrap;
        font-size:13px;
      }

      .network-subtitle{
        display:none;
      }

      .top-logo{
        width:44px;
        height:44px;
      }

      .network-title{
        font-size:15px;
      }

      section{
        padding:
          120px
          24px
          60px;
      }

      .hero-title{
        font-size:44px;
      }

      .hero-logo{
        width:84px;
      }

      .about-stack{
        grid-template-columns:1fr;
      }

      .info-panel,
      .core-panel{
        padding:30px;
      }

      .core-title{
        font-size:42px;
      }
    }

  </style>
</head>

<body>

  <!-- TOPBAR -->

  <header class="topbar">

    <!-- LEFT -->
    <div class="top-left">

      <img
        src="../assets/main-logo.png"
        alt=""
        class="top-logo"
      />

      <div class="top-info">

        <h1 class="network-title">
          S.E.N.T.R.A NETWORK
        </h1>

        <p class="network-subtitle">
          International Threat Response System
        </p>

      </div>

    </div>

    <!-- RIGHT -->
    <nav class="top-nav">

      <div class="nav-group">

        <span class="nav-divider"></span>

        <a href="main.html" class="nav-link active">
          หน้าหลัก
        </a>

        <span class="nav-divider"></span>

        <a href="about.html" class="nav-link">
          เกี่ยวกับ
        </a>

        <span class="nav-divider"></span>

        <a href="#" class="nav-link">
          ภัยคุกคาม
        </a>

        <span class="nav-divider"></span>

        <a href="#" class="nav-link">
          เจ้าหน้าที่
        </a>

        <span class="nav-divider"></span>

        <a href="#" class="nav-link">
          รายงาน
        </a>

        <span class="nav-divider"></span>

        <a href="#" class="nav-link">
          วิจัย
        </a>

        <span class="nav-divider"></span>

        <a href="map.html" class="nav-link">
          แผนที่
        </a>

        <span class="nav-divider"></span>

      </div>

    </nav>

  </header>

 



  

</body>
</html>
