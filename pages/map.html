<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>S.E.N.T.R.A MAP</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800&family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --white:#ffffff;
      --line:rgba(255,255,255,.14);
      --soft:rgba(255,255,255,.72);
      --bg:#000000;
    }

    html{
      scroll-behavior:smooth;
    }

    body{

      background:black;

      color:white;

      overflow-x:hidden;

      font-family:"Kanit",sans-serif;
    }

    /* ========================= */
    /* BG GRID */
    /* ========================= */

    body::before{

      content:"";

      position:fixed;

      inset:0;

      background-image:
        radial-gradient(
          rgba(255,255,255,.04) 1px,
          transparent 1px
        );

      background-size:18px 18px;

      opacity:.08;

      pointer-events:none;

      mask-image:
        linear-gradient(
          to bottom,
          transparent,
          black 10%,
          black 90%,
          transparent
        );
    }

    /* ========================= */
    /* TOPBAR */
    /* ========================= */

    .topbar{

      position:fixed;

      top:0;
      left:0;

      width:100%;
      height:92px;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:0 38px;

      background:
        rgba(0,0,0,.96);

      border-bottom:
        1px solid rgba(255,255,255,.14);

      backdrop-filter:blur(10px);

      z-index:9999;
    }

    .topbar::after{

      content:"";

      position:absolute;

      left:0;
      bottom:-1px;

      width:100%;
      height:1px;

      background:
        linear-gradient(
          to right,
          transparent,
          rgba(255,255,255,.25),
          transparent
        );
    }

    /* LEFT */

    .top-left{

      display:flex;
      align-items:center;

      gap:16px;
    }

    .top-logo{

      width:52px;
      height:52px;

      object-fit:contain;
    }

    .top-info{
      display:flex;
      flex-direction:column;
    }

    .network-title{

      font-family:'Orbitron',sans-serif;

      font-size:18px;
      font-weight:700;

      letter-spacing:1px;

      line-height:1;
    }

    .network-subtitle{

      font-size:12px;

      color:
        rgba(255,255,255,.76);

      margin-top:4px;
    }

    /* NAV */

    .top-nav{
      display:flex;
      align-items:center;
    }

    .nav-group{

      display:flex;
      align-items:center;

      gap:24px;
    }

    .nav-link{

      color:
        rgba(255,255,255,.62);

      text-decoration:none;

      font-size:14px;
      font-weight:500;

      transition:.25s;
    }

    .nav-link:hover{
      color:white;
    }

    .nav-link.active{

      color:white;

      font-weight:700;
    }

    .nav-divider{

      width:1px;
      height:18px;

      background:
        rgba(255,255,255,.34);
    }

    /* ========================= */
    /* MAIN */
    /* ========================= */

    .map-section{

      width:100%;
      min-height:100vh;

      padding:
        150px
        60px
        60px;

      position:relative;
    }

    /* ========================= */
    /* TITLE */
    /* ========================= */

    .map-title{

  font-family:'Orbitron',sans-serif;

  text-align:center;

  font-size:56px;
  font-weight:800;

  letter-spacing:2px;

  line-height:1.1;

  margin-bottom:34px;

  text-transform:uppercase;
}

    /* ========================= */
    /* MAP WRAP */
    /* ========================= */

    .map-wrap{

      position:relative;

      width:100%;
      max-width:1500px;

      margin:auto;

      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* MAP IMAGE */

    .world-map{

      width:100%;

      object-fit:contain;

      opacity:.92;

      filter:
        drop-shadow(0 0 30px rgba(255,255,255,.06));
    }

    /* ========================= */
    /* SCAN LINE */
    /* ========================= */

    .scan-line{

      position:absolute;

      top:0;
      left:0;

      width:100%;
      height:2px;

      background:
        linear-gradient(
          to right,
          transparent,
          rgba(255,255,255,.85),
          transparent
        );

      box-shadow:
        0 0 18px rgba(255,255,255,.3);

      animation:
        scanMove 6s linear infinite;
    }

    @keyframes scanMove{

      from{
        transform:
          translateY(0);
      }

      to{
        transform:
          translateY(720px);
      }
    }

    /* ========================= */
    /* CORNERS */
    /* ========================= */

    .map-wrap::before,
    .map-wrap::after{

      content:"";

      position:absolute;

      width:40px;
      height:40px;

      border:3px solid white;
    }

    .map-wrap::before{

      top:-12px;
      left:-12px;

      border-right:none;
      border-bottom:none;
    }

    .map-wrap::after{

      right:-12px;
      bottom:-12px;

      border-left:none;
      border-top:none;
    }

    /* ========================= */
    /* MOBILE */
    /* ========================= */

    @media(max-width:1100px){

      .map-title{
        font-size:52px;
      }
    }

    @media(max-width:768px){

      .topbar{
        padding:0 18px;
      }

      .top-nav{
        display:none;
      }

      .map-section{

        padding:
          130px
          20px
          40px;
      }

      .map-title{

        font-size:34px;

        line-height:1.3;
      }
    }

    /* ========================= */
/* TABLET */
/* ========================= */

@media(max-width:1024px){

  .welcome-title{
    font-size:84px;
    letter-spacing:8px;
  }

  .main-logo{
    width:190px;
    height:190px;
  }

  .subtitle{
    font-size:13px;
    letter-spacing:2px;
    padding:0 20px;
  }

  .topbar{
    padding:0 24px;
  }

  .top-right{
    gap:12px;
    font-size:12px;
  }
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:768px){

  body{
    overflow-y:auto;
  }

  .topbar{

    height:74px;

    padding:
      0
      16px;
  }

  .top-left{
    gap:10px;
  }

  .top-logo{

    width:38px;
    height:38px;
  }

  .network-text{

    font-size:11px;

    letter-spacing:.5px;
  }

  .top-right{
    display:none;
  }

  .container{

    padding:
      110px
      20px
      40px;
  }

  .content{
    width:100%;
  }

  .main-logo{

    width:130px;
    height:130px;

    margin-bottom:12px;
  }

  .welcome-title{

    font-size:46px;

    letter-spacing:4px;

    line-height:1.05;
  }

  .welcome-title::before,
  .welcome-title::after{
    display:none;
  }

  .subtitle{

    margin-top:14px;
    margin-bottom:28px;

    font-size:11px;

    line-height:1.7;

    letter-spacing:1.4px;

    padding:
      0
      10px;
  }

  .login-section{
    max-width:100%;
  }

  .input-group{
    margin-bottom:14px;
  }

  .input-group input{

    height:54px;

    font-size:16px;

    padding:
      0
      18px;

    border-width:2px;
  }

  .forgot-password{

    font-size:12px;

    margin-bottom:20px;
  }

  .login-button{

    width:100%;
    height:58px;

    font-size:18px;
  }

  .side-accent{
    display:none;
  }

  .binary{
    font-size:10px;
  }
}

/* ========================= */
/* SMALL MOBILE */
/* ========================= */

@media(max-width:480px){

  .welcome-title{

    font-size:38px;

    letter-spacing:3px;
  }

  .subtitle{

    font-size:10px;

    letter-spacing:1px;
  }

  .main-logo{

    width:110px;
    height:110px;
  }

  .input-group input{

    height:50px;

    font-size:15px;
  }

  .login-button{

    height:54px;

    font-size:17px;
  }
}

  </style>
</head>

    <nav class="top-nav">
